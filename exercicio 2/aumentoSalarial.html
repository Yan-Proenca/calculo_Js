<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Aumento Salarial</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-green-100 min-h-screen flex items-center justify-center text-gray-800">
    <div class="w-full max-w-lg bg-white p-8 rounded-2xl shadow-xl space-y-6">
        
        <h2 class="text-2xl font-bold text-center text-green-800">Cálculo de Aumento Salarial</h2>

        <!-- Forms -->
        <div class="space-y-4">
            <div>
                <label class="block mb-1 text-sm text-gray-600">Salário Bruto:</label>
                <input type="number" id="salarioBruto" placeholder="Ex: 1500" class="w-full p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-400">
            </div>


            <button onclick="calculoAumentoSalarial()" class="w-full bg-green-800 hover:bg-green-500 transition p-3 rounded-lg font-semibold text-gray-300">Calcular Aumento</button>

            <div id="resultado"
                class="bg-green-50 border border-green-200 p-4 rounded-lg text-center text-lg font-semibold min-h-[50px] flex items-center justify-center">
                Resultado aparecerá aqui
            </div>
            <div class="flex justify-end">
            <a href="../index.html"
            class="bg-gray-900 hover:bg-gray-500 transition px-4 py-2 rounded-lg font-semibold text-gray-300 text-sm">
                Menu
            </a>
        </div>
        </div>
    </div>
</body>
<script src="codigo.js"></script>
</html>
