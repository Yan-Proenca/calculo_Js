<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cálculo de Custo Mensal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-red-100 min-h-screen flex items-center justify-center text-gray-800"> 

    <div class="w-full max-w-lg bg-white p-8 rounded-2xl shadow-xl space-y-6">
        
        <h2 class="text-2xl font-bold text-center text-red-800">Cálculo de Custo Mensal</h2>

        <div class="space-y-4">
            <div>
                <label>Quantidade de Pessoas:</label>
                <input type="number" id="quantidadePessoas" placeholder="Ex: 80" class="w-full p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-400">
            </div>

        <button onclick="calculoCustoMensal()"class="w-full bg-red-800 hover:bg-red-500 transition p-3 rounded-lg font-semibold text-gray-300">Calcular</button>

        <div id="resultado"></div>
        <div class="flex justify-end">
            <a href="../index.html"
            class="bg-gray-900 hover:bg-gray-500 transition px-4 py-2 rounded-lg font-semibold text-gray-300 text-sm">
                Menu
            </a>
        </div>
    </div>
</body>
<script src="codigo.js"></script>
</html>
